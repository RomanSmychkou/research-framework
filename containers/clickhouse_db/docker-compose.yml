services:
  clickhouse:
    # Pin: clickhouse/VERSION (override via CLICKHOUSE_SERVER_IMAGE in .env)
    image: ${CLICKHOUSE_SERVER_IMAGE:-clickhouse/clickhouse-server:23.11.5.29}
    container_name: pce-clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # Init scripts in /docker-entrypoint-initdb.d run once on empty volume only.
      # Recreate schema: docker compose down -v && docker compose up -d clickhouse
      - ./clickhouse/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_DB: crypto_db
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse_data: